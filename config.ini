# ============================================================
# Medicine Autobot – Configuration File
# ============================================================
# Copy this file to the same folder as medicine_autobot.py,
# then edit the values below to match your environment.
# ============================================================

# ------------------------------------------------------------
# [excel] – location of your spreadsheet
# ------------------------------------------------------------
[excel]
# Absolute or relative path to the Excel file
file_path = medicines.xlsx

# Name of the sheet to read, e.g. "Sheet1".
# Use 0 (zero) to always read the FIRST sheet regardless of its name.
sheet_name = 0


# ------------------------------------------------------------
# [database] – choose ONE block and fill in the details
# ------------------------------------------------------------

# -------- SQLite (default, great for local / testing) --------
[database]
type     = sqlite
# Path to the SQLite file that will be created automatically
path     = medicines.db


# -------- MySQL / MariaDB ------------------------------------
# [database]
# type     = mysql
# driver   = pymysql          # pip install PyMySQL
# host     = localhost
# port     = 3306
# user     = root
# password = your_password
# dbname   = pharmacy


# -------- PostgreSQL -----------------------------------------
# [database]
# type     = postgresql
# driver   = psycopg2         # pip install psycopg2-binary
# host     = localhost
# port     = 5432
# user     = postgres
# password = your_password
# dbname   = pharmacy


# -------- Microsoft SQL Server --------------------------------
# [database]
# type     = mssql
# driver   = pyodbc            # pip install pyodbc
# host     = localhost
# port     = 1433
# user     = sa
# password = your_password
# dbname   = pharmacy
